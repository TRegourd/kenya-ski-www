name: Philip Kimely Boit
discipline: Cross-Country Skiing
tagline: Olympic Pioneer · Kenya's First Winter Olympian
born: 12 December 1971
basedIn: Eldoret, Kenya
portrait: /images/athletes/philip-boit-profile.jpg
